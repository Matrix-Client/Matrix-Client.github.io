<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrix - Mace PvP Client</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Orbitron:wght@400..900&display=swap" rel="stylesheet">
    
    <style>
        /* CSS Reset & Base Styling */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            /* Explicitly setting default system cursor */
            cursor: default; 
        }

        body {
            background-color: #05020a;
            /* Dark radial gradient to mimic the soft purple glow behind the text */
            background-image: radial-gradient(circle at center, #1b0a30 0%, #05020a 70%);
            color: #ffffff;
            font-family: "Montserrat", sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow-x: hidden;
        }

        /* --- NAVIGATION BAR --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px 50px;
            width: 100%;
        }

        .logo {
            font-family: "Orbitron", sans-serif;
            font-size: 24px;
            font-weight: 900;
            letter-spacing: 3px;
            color: #a855f7;
            text-transform: uppercase;
        }

        nav {
            display: flex;
            gap: 40px;
        }

        nav a {
            text-decoration: none;
            color: #94a3b8;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: color 0.2s ease;
            cursor: pointer; /* Keeps standard hand cursor for links */
        }

        nav a:hover {
            color: #ffffff;
        }

        .nav-btn {
            background-color: #7c3aed;
            color: #ffffff;
            padding: 10px 24px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 2px;
            text-decoration: none;
            text-transform: uppercase;
            transition: background 0.2s ease;
            cursor: pointer;
        }

        .nav-btn:hover {
            background-color: #6d28d9;
        }

        /* --- HERO SECTION --- */
        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            justify-content: center;
            flex-grow: 1;
            padding: 40px 20px;
        }

        /* Small badge at top of main title */
        .badge {
            background-color: rgba(124, 58, 237, 0.15);
            border: 1px solid rgba(124, 58, 237, 0.3);
            color: #a855f7;
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 24px;
            display: inline-block;
        }

        /* Huge title with vertical purple-to-white gradient */
        .title {
            font-family: "Orbitron", sans-serif;
            font-size: clamp(60px, 10vw, 120px); /* Responsive sizing */
            font-weight: 900;
            letter-spacing: 6px;
            text-transform: uppercase;
            background: linear-gradient(to bottom, #ffffff 40%, #a855f7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
            line-height: 0.9;
        }

        .subtitle {
            color: #94a3b8;
            font-size: 11px;
            letter-spacing: 4px;
            text-transform: uppercase;
            max-width: 600px;
            line-height: 1.8;
            margin-bottom: 40px;
        }

        /* --- BUTTONS --- */
        .btn-container {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .btn-discord {
            background-color: #7c3aed;
            color: #ffffff;
            padding: 14px 32px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 2px;
            text-decoration: none;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: transform 0.2s, background 0.2s;
            cursor: pointer;
        }

        .btn-discord:hover {
            background-color: #6d28d9;
            transform: translateY(-2px);
        }

        .btn-discord svg {
            fill: currentColor;
            width: 16px;
            height: 16px;
        }

        .btn-modules {
            border: 1px solid rgba(255, 255, 255, 0.1);
            background-color: transparent;
            color: #ffffff;
            padding: 14px 32px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 2px;
            text-decoration: none;
            text-transform: uppercase;
            transition: background 0.2s, border-color 0.2s;
            cursor: pointer;
        }

        .btn-modules:hover {
            background-color: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.3);
        }

        /* Bottom padding to balance layout */
        .footer-spacer {
            height: 100px;
        }

        /* Responsive Design tweaks for mobile screens */
        @media (max-width: 768px) {
            header {
                padding: 20px;
                flex-direction: column;
                gap: 20px;
            }
            nav {
                gap: 20px;
            }
            .btn-container {
                flex-direction: column;
                width: 100%;
                max-width: 300px;
            }
            .btn-discord, .btn-modules {
                width: 100%;
                text-align: center;
                justify-content: center;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">Matrix</div>
        <nav>
            <a href="#">Servers</a>
            <a href="#">Modules</a>
            <a href="#">Get Client</a>
        </nav>
        <a href="#" class="nav-btn">Get Beta Access</a>
    </header>

    <main class="hero">
        <div class="badge">• #1 Mace PvP Client</div>
        <h1 class="title">Matrix</h1>
        <p class="subtitle">The most advanced mace pvp client - totally free<br>releasing soon!</p>
        
        <div class="btn-container">
            <a href="#" class="btn-discord">
                <svg viewBox="0 0 127.14 96.36">
                    <path d="M107.7,8.07A105.15,105.15,0,0,0,77.26,0a77.19,77.19,0,0,0-3.3,6.83A96.67,96.67,0,0,0,53.18,6.83,77.19,77.19,0,0,0,49.88,0,105.15,105.15,0,0,0,19.44,8.07C3.66,31.58-1.86,54.65,1,77.53A105.73,105.73,0,0,0,32,96.36a77.7,77.7,0,0,0,6.63-10.85,68.43,68.43,0,0,1-10.4-5c.87-.64,1.71-1.34,2.51-2a75.58,75.58,0,0,0,72.48,0c.8.71,1.64,1.41,2.51,2a68.41,68.41,0,0,1-10.4,5,77.7,77.7,0,0,0,6.63,10.85,105.73,105.73,0,0,0,31-18.83C129,54.65,123.52,31.58,107.7,8.07ZM42.45,65.69C36.18,65.69,31,60,31,53S36.18,40.36,42.45,40.36,53.83,46,53.83,53,48.72,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.24,60,73.24,53S78.41,40.36,84.69,40.36,96.07,46,96.07,53,91,65.69,84.69,65.69Z"/>
                </svg>
                Join Discord
            </a>
            <a href="#" class="btn-modules">❯ View Modules</a>
        </div>
    </main>

    <div class="footer-spacer"></div>

</body>
</html>
